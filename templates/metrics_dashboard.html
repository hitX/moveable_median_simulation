<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Metrics - CARLA Traffic Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/metrics_dashboard.css">
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Performance Metrics Dashboard</h1>
        <p>Dynamic Median Traffic Management System - Real-World Performance Analysis</p>
    </div>
    
    <div class="nav-buttons">
        <a href="/" class="nav-btn"><i class="fas fa-home"></i> Main Dashboard</a>
        <a href="/metrics" class="nav-btn active"><i class="fas fa-chart-bar"></i> Metrics</a>
        <button class="nav-btn" onclick="loadMetrics()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
    </div>
    
    <div id="content">
        <div class="loading">
            <i class="fas fa-spinner fa-spin"></i> Loading metrics data...
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadMetrics()" title="Refresh Data">
        <i class="fas fa-sync-alt"></i>
    </button>

    <script src="../static/js/metrics_dashboard.js"></script>
</body>
</html>
